<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>hillel 3</title>
</head>
<script>
    console.log("string:", typeof "Hello, world!");
    console.log("number:", typeof 42);
    console.log("boolean:", typeof true);
    console.log("undefined:", typeof undefined);
    console.log("null:", typeof null);
    console.log("object:", typeof { name: "Alice" });
    console.log("function:", typeof function() {});
    console.log("symbol:", typeof Symbol("symbol"));
    console.log("bigint:", typeof BigInt(123456789012345));
</script>

</body>
</html>
